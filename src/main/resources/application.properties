spring.application.name=veciapp-api
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:veciapp}?sslmode=${DB_SSL_MODE:disable}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

security.jwt.secret=${JWT_SECRET:veciapp-default-secret-key-change-me-2026-secure}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

